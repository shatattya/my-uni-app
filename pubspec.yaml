name: myuniapp
description: "A sleek, offline-first campus companion for students and teachers. Built with Flutter and Firebase."

publish_to: 'none'

version: 4.0.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Firebase
  firebase_core: ^2.31.1
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0

  # Notifications
  firebase_messaging: ^14.9.1
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.1.2 # ADDED: For offline exam scheduling
  timezone: ^0.9.2 # ADDED: Required for scheduled local notifications

  # Local database & Storage
  drift: ^2.19.1+1
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.5
  shared_preferences: ^2.2.3 # ADDED: For Smart Cooldown metadata

  # Networking
  dio: ^5.4.1
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

  # Utilities
  screenshot: ^2.1.0
  share_plus: ^7.2.2
  path: ^1.9.1
  intl: ^0.20.2
  flutter_screenutil: ^5.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0
  build_runner: ^2.4.13
  drift_dev: ^2.19.1
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/images/
    - assets/avatars/
    - assets/data/

  fonts:
    - family: MyFont
      fonts:
        - asset: assets/fonts/sfpro.otf

  uses-material-design: true

flutter_launcher_icons:
  android: true
  image_path: "assets/images/appicon.png"

flutter_native_splash:
  color: "#000000"
  image: assets/images/appicon.png
  android: true